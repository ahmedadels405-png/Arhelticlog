<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AthleticLog</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: -apple-system, Arial;
  background: #0f0f0f;
  color: white;
  padding: 15px;
}
button {
  display:block;
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:none;
  background:#1f7aff;
  color:white;
}
.card {
  background:#1c1c1c;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}
input {
  width:45%;
  padding:8px;
  margin-top:6px;
}
.small { color:#aaa; font-size:12px; }
</style>
</head>
<body>

<h1>🏋️ AthleticLog</h1>

<div id="menu">
<button onclick="startWorkout()">Start Workout</button>
<button onclick="showHistory()">History</button>
<button onclick="clearData()">Reset App</button>
</div>

<div id="content"></div>

<script>
const exercises = [
"Bench Press","Deadlift","Bulgarian Split Squat","Pull-ups",
"Kettlebell Swings","Overhead Press","Lat Pulldown",
"Barbell Row","Plank","Box Jumps","Front Squat","Incline DB Press"
];

let today = [];

function startWorkout() {
  today = shuffle(exercises).slice(0,5);
  let html = "<h2>Today's Workout</h2>";
  today.forEach((ex,i)=>{
    html += `
    <div class="card">
      <b>${ex}</b><br>
      <input id="w${i}" placeholder="Weight">
      <input id="r${i}" placeholder="Reps">
      <button onclick="logSet(${i})">Log Set</button>
    </div>`;
  });
  document.getElementById("content").innerHTML = html;
}

function logSet(i) {
  let weight = document.getElementById("w"+i).value;
  let reps = document.getElementById("r"+i).value;
  if(!weight || !reps) {
    alert("Enter weight and reps");
    return;
  }

  let log = JSON.parse(localStorage.getItem("log")||"[]");
  log.push({
    date:new Date().toLocaleDateString(),
    exercise:today[i],
    weight:weight,
    reps:reps
  });
  localStorage.setItem("log",JSON.stringify(log));

  document.getElementById("w"+i).value="";
  document.getElementById("r"+i).value="";

  showMessage("Set saved for " + today[i]);
}

function showHistory() {
  let log = JSON.parse(localStorage.getItem("log")||"[]");
  if(log.length===0) {
    document.getElementById("content").innerHTML="<p>No history yet.</p>";
    return;
  }

  let html="<h2>History</h2>";
  log.slice().reverse().forEach(l=>{
    html += `
    <div class="card">
      ${l.date}<br>
      <b>${l.exercise}</b><br>
      ${l.weight} × ${l.reps}
    </div>`;
  });
  document.getElementById("content").innerHTML=html;
}

function clearData() {
  localStorage.clear();
  document.getElementById("content").innerHTML="";
  alert("App reset");
}

function showMessage(msg) {
  let div=document.createElement("div");
  div.className="card";
  div.innerText=msg;
  document.getElementById("content").prepend(div);
}

function shuffle(a) {
  return [...a].sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
