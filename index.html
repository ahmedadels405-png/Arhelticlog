<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#0b0f0c;
    color:#e6f4ea;
}

header{
    padding:16px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.tabs{
    display:flex;
    gap:8px;
    padding:0 12px 12px 12px;
}

.tab{
    flex:1;
    padding:10px;
    border-radius:12px;
    text-align:center;
    background:#162019;
    color:#9fb3a3;
}

.tab.active{
    background:#22c55e;
    color:black;
    font-weight:600;
}

.container{
    padding:12px;
}

.card{
    background:#162019;
    padding:14px;
    margin-bottom:12px;
    border-radius:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:8px;
    font-size:16px;
}

.start{background:#22c55e;color:black}
.finish{background:#ef4444}
.swap{background:#eab308;color:black}
.log{background:#3b82f6}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
}
</style>
</head>

<body>

<header>🏋️ AthleticLog</header>

<div class="tabs">
    <div class="tab active" onclick="showTab('schedule',this)">🏋️ Schedule</div>
    <div class="tab" onclick="showTab('history',this)">📜 History</div>
    <div class="tab" onclick="showTab('stats',this)">📊 Stats</div>
</div>

<div class="container" id="app"></div>

<script>
const allExercises=[
"Back Squat","Front Squat","Bulgarian Split Squat","Romanian Deadlift",
"Bench Press","Incline Bench Press","Overhead Press","Dips",
"Pull Up","Barbell Row","Lat Pulldown","Dumbbell Row",
"Power Clean","Box Jump","Kettlebell Swing","Sprint",
"Plank","Russian Twist","Hanging Leg Raise"
];

const workoutPools={
explosive:["Power Clean","Box Jump","Kettlebell Swing","Sprint"],
push:["Bench Press","Incline Bench Press","Overhead Press","Dips"],
pull:["Pull Up","Barbell Row","Lat Pulldown","Dumbbell Row"],
legs:["Back Squat","Front Squat","Bulgarian Split Squat","Romanian Deadlift"],
core:["Plank","Russian Twist","Hanging Leg Raise"],
mixed:allExercises
};

let selectedType="mixed";
let currentWorkout=[];

function showTab(name,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');

    if(name==="schedule") renderSchedule();
    if(name==="history") renderHistory();
    if(name==="stats") renderStats();
}

function renderSchedule(){
    const today=new Date().toLocaleDateString(undefined,{weekday:'long'});
    const app=document.getElementById("app");

    app.innerHTML=`
    <div class="card">
        <h3>🗓 ${today}</h3>
        <h2>🔥 ${selectedType.toUpperCase()} SESSION</h2>
    </div>

    <div class="card">
        <b>Select Workout Type</b>
        <div class="grid">
            <button onclick="setType('explosive')">🔥 Explosive</button>
            <button onclick="setType('push')">💪 Push</button>
            <button onclick="setType('pull')">🧲 Pull</button>
            <button onclick="setType('legs')">🦵 Legs</button>
            <button onclick="setType('core')">🎯 Core</button>
            <button onclick="setType('mixed')">⚡ Mixed</button>
        </div>
        <button class="start" onclick="startWorkout()">🚀 Start Workout</button>
    </div>

    <div id="workout"></div>
    `;
}

function setType(t){
    selectedType=t;
    renderSchedule();
}

function pickExercises(){
    const pool=workoutPools[selectedType];
    const chosen=[];
    while(chosen.length<5){
        const ex=pool[Math.floor(Math.random()*pool.length)];
        if(!chosen.includes(ex)) chosen.push(ex);
    }
    return chosen;
}

function startWorkout(){
    currentWorkout=pickExercises().map(e=>({exercise:e,sets:[]}));
    renderWorkout();
}

function renderWorkout(){
    const div=document.getElementById("workout");
    div.innerHTML="";
    currentWorkout.forEach((item,i)=>{
        const c=document.createElement("div");
        c.className="card";
        c.innerHTML=`
            <h4>${item.exercise}</h4>
            <button class="swap" onclick="swapExercise(${i})">🔁 Swap Exercise</button>
            <input placeholder="Weight" id="w-${i}">
            <input placeholder="Reps" id="r-${i}">
            <button class="log" onclick="addSet(${i})">➕ Add Set</button>
        `;
        div.appendChild(c);
    });

    div.innerHTML+=`<button class="finish" onclick="finishWorkout()">🏁 Finish Workout</button>`;
}

function swapExercise(i){
    const pool=workoutPools[selectedType];
    let ex;
    do{
        ex=pool[Math.floor(Math.random()*pool.length)];
    }while(currentWorkout.some(e=>e.exercise===ex));
    currentWorkout[i].exercise=ex;
    renderWorkout();
}

function addSet(i){
    const w=document.getElementById(`w-${i}`).value;
    const r=document.getElementById(`r-${i}`).value;
    if(!w||!r)return;
    currentWorkout[i].sets.push({w,r});
}

function finishWorkout(){
    const history=JSON.parse(localStorage.getItem("history")||"[]");
    history.push({
        date:new Date().toLocaleString(),
        type:selectedType,
        workout:currentWorkout
    });
    localStorage.setItem("history",JSON.stringify(history));
    renderSchedule();
}

function renderHistory(){
    const app=document.getElementById("app");
    const history=JSON.parse(localStorage.getItem("history")||"[]");

    app.innerHTML="<h3>📜 Past Workouts</h3>";

    history.slice().reverse().forEach(w=>{
        const c=document.createElement("div");
        c.className="card";
        c.innerHTML=`<b>${w.date}</b><br>${w.type}`;
        app.appendChild(c);
    });
}

function renderStats(){
    document.getElementById("app").innerHTML="<h3>Stats coming next</h3>";
}

renderSchedule();
</script>

</body>
</html>
