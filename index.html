<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>

<style>
:root{
--bg:#0b0d11;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--accent:linear-gradient(135deg,#60a5fa,#a78bfa);
--text:#f1f5f9;
--muted:#94a3b8;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
}

header{
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.tabs{
display:flex;
gap:8px;
padding:0 12px 12px 12px;
}

.tab{
flex:1;
padding:10px;
border-radius:14px;
text-align:center;
background:#131720;
color:var(--muted);
transition:.2s;
}

.tab.active{
background:var(--accent);
color:white;
}

.container{
padding:14px;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:16px;
margin-bottom:14px;
border-radius:20px;
backdrop-filter:blur(18px);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
margin-top:8px;
font-size:15px;
}

.theme{
background:#131720;
color:var(--muted);
}

.theme.active{
background:var(--accent);
color:white;
font-weight:600;
}

.start{
background:var(--accent);
color:white;
font-weight:600;
}

.finish{
background:#ef4444;
color:white;
}

.swap{
background:#1f2430;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid var(--border);
background:#0f131a;
color:white;
}

.progress{
height:8px;
background:#1f2430;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:var(--accent);
width:0%;
}
.timer{
font-size:18px;
margin-top:4px;
color:#a5b4fc;
}
</style>
</head>

<body>

<header>🏋️ AthleticLog</header>

<div class="tabs">
<div class="tab active" onclick="showTab('schedule',this)">🏋️ Schedule</div>
<div class="tab" onclick="showTab('history',this)">📜 History</div>
<div class="tab" onclick="showTab('stats',this)">📊 Stats</div>
</div>

<div class="container" id="app"></div>

<script>
const pools={
push:["Bench Press","Incline Press","Overhead Press","Dips"],
pull:["Pull Up","Row","Face Pull"],
legs:["Squat","Lunge","RDL"],
core:["Plank","Hanging Raise","Twist"],
explosive:["Clean","Box Jump","Sprint"]
};

let selected=new Set(["push"]);
let workout=[];
let startTime=null;
let timerInterval=null;

function showTab(name,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');

if(name==="schedule") schedule();
if(name==="history") historyView();
if(name==="stats") stats();
}

function schedule(){
const today=new Date().toLocaleDateString(undefined,{weekday:'long'});

document.getElementById("app").innerHTML=`
<div class="card">
<h3>${today}</h3>
<h2>${Array.from(selected).join(" + ").toUpperCase()}</h2>
</div>

<div class="card">
<div class="grid">
${btn("push","💪 Push")}
${btn("pull","🧲 Pull")}
${btn("legs","🦵 Legs")}
${btn("core","🎯 Core")}
${btn("explosive","🔥 Explosive")}
</div>
<button class="start" onclick="start()">Start Workout</button>
</div>

<div id="w"></div>
`;
}

function btn(k,l){
const a=selected.has(k)?"active":"";
return `<button class="theme ${a}" onclick="toggle('${k}')">${l}</button>`;
}

function toggle(t){
if(selected.has(t)) selected.delete(t);
else selected.add(t);
if(selected.size===0) selected.add("push");
schedule();
}

function pool(){
let s=new Set();
selected.forEach(t=>pools[t].forEach(e=>s.add(e)));
return Array.from(s);
}

function start(){
const p=pool();
workout=[];
for(let i=0;i<5;i++){
workout.push({name:p[Math.floor(Math.random()*p.length)],sets:[]});
}
startTime=Date.now();
clearInterval(timerInterval);
timerInterval=setInterval(updateTimer,1000);
renderWorkout();
}

function updateTimer(){
const diff=Math.floor((Date.now()-startTime)/1000);
const m=Math.floor(diff/60).toString().padStart(2,'0');
const s=(diff%60).toString().padStart(2,'0');
const t=document.getElementById("timer");
if(t) t.textContent=`⏱ ${m}:${s}`;
}

function renderWorkout(){
const w=document.getElementById("w");
w.innerHTML=`
<div class="card">
<div id="timer" class="timer">⏱ 00:00</div>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>
`;

workout.forEach((e,i)=>{
w.innerHTML+=`
<div class="card">
<h4>🏋️ ${e.name}</h4>
<button class="swap" onclick="swap(${i})">🔁 Swap</button>
<input placeholder="Weight">
<input placeholder="Reps">
<button onclick="logSet(${i})">Add Set</button>
</div>
`;
});

w.innerHTML+=`<button class="finish" onclick="finish()">Finish Workout</button>`;
}

function swap(i){
const p=pool();
workout[i].name=p[Math.floor(Math.random()*p.length)];
renderWorkout();
}

function logSet(i){
workout[i].sets.push({});
updateProgress();
}

function updateProgress(){
const total=workout.length;
const done=workout.filter(e=>e.sets.length>0).length;
const percent=(done/total)*100;
document.getElementById("bar").style.width=percent+"%";
}

function finish(){
clearInterval(timerInterval);
const history=JSON.parse(localStorage.getItem("history")||"[]");
history.push({
date:new Date().toLocaleString(),
themes:Array.from(selected),
workout:workout,
duration:Math.floor((Date.now()-startTime)/1000)
});
localStorage.setItem("history",JSON.stringify(history));
schedule();
}

function historyView(){
const h=JSON.parse(localStorage.getItem("history")||"[]");
let html="<div class='card'><b>Past Sessions</b></div>";
h.slice().reverse().forEach(s=>{
html+=`<div class="card">${s.date}<br>${s.themes.join(" + ")}</div>`;
});
document.getElementById("app").innerHTML=html;
}

function stats(){
const h=JSON.parse(localStorage.getItem("history")||"[]");
document.getElementById("app").innerHTML=`
<div class="card">
Total workouts: ${h.length}
</div>
`;
}

schedule();
</script>

</body>
</html>
