<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#0f0f0f;color:white;margin:0;padding:20px}
h1{text-align:center}
button{width:100%;padding:15px;margin:8px 0;font-size:18px;border:none;border-radius:12px}
.start{background:#28a745;color:white}
.history{background:#444;color:white}
.log{background:#007bff;color:white;margin-top:5px}
.card{background:#1c1c1c;padding:15px;margin:10px 0;border-radius:12px}
input{width:48%;padding:10px;margin-top:5px;border-radius:8px;border:none}
.set-row{display:flex;gap:4%}
</style>
</head>
<body>
<h1>AthleticLog</h1>
<button class="start" onclick="startWorkout()">Start Workout</button>
<button class="history" onclick="showHistory()">View History</button>
<div id="app"></div>
<script>
const exercises=["Back Squat","Front Squat","Goblet Squat","Bulgarian Split Squat","Walking Lunges","Leg Press","Hack Squat","Romanian Deadlift","Deadlift","Sumo Deadlift","Trap Bar Deadlift","Hip Thrust","Glute Bridge","Step Ups","Nordic Curl","Bench Press","Incline Bench Press","Decline Bench Press","Push Up","Weighted Push Up","Dips","Chest Fly","Cable Fly","Pec Deck","Landmine Press","Overhead Press","Seated Dumbbell Press","Arnold Press","Push Press","Handstand Push Up","Lateral Raise","Front Raise","Rear Delt Fly","Face Pull","Upright Row","Pull Up","Chin Up","Lat Pulldown","Close Grip Pulldown","Straight Arm Pulldown","Barbell Row","Dumbbell Row","Pendlay Row","Cable Row","T-Bar Row","Shrugs","Farmer Carry","Suitcase Carry","Kettlebell Swing","Power Clean","Hang Clean","Snatch","High Pull","Box Jump","Broad Jump","Plank","Side Plank","Russian Twist","Hanging Leg Raise","Toes to Bar","Ab Wheel","Sit Up","V Up","Mountain Climbers","Dead Bug","Battle Ropes","Sled Push","Sled Pull","Bike Sprint","Row Sprint","Jump Rope","Agility Ladder","Cone Drills","Sprint","Shuttle Run","Calf Raise","Seated Calf Raise","Tibialis Raise","Reverse Lunge","Curtsy Lunge","Single Leg Deadlift","Good Morning","Jefferson Curl","Cable Kickback","Fire Hydrant","Resistance Band Walk","Clamshell","Hip Airplane","Skater Jump","Depth Jump","Wall Sit","Bear Crawl","Crab Walk","Turkish Get Up","Sandbag Carry"];
function pickExercises(){const chosen=[];while(chosen.length<6){const pick=exercises[Math.floor(Math.random()*exercises.length)];if(!chosen.includes(pick))chosen.push(pick)}return chosen}
function startWorkout(){const list=pickExercises();const container=document.getElementById("app");container.innerHTML="";list.forEach(ex=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<h3>${ex}</h3><div class="set-row"><input type="number" placeholder="Weight"><input type="number" placeholder="Reps"></div><button class="log" onclick="logSet('${ex}',this)">Log Set</button>`;container.appendChild(card)})}
function logSet(exercise,btn){const inputs=btn.parentElement.querySelectorAll("input");const weight=inputs[0].value;const reps=inputs[1].value;if(!weight||!reps){alert("Enter weight and reps");return}const history=JSON.parse(localStorage.getItem("history")||"[]");history.push({exercise,weight,reps,date:new Date().toLocaleString()});localStorage.setItem("history",JSON.stringify(history));btn.innerText="Logged"}
function showHistory(){const history=JSON.parse(localStorage.getItem("history")||"[]");const container=document.getElementById("app");container.innerHTML="<h2>Workout History</h2>";history.slice().reverse().forEach(log=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<b>${log.exercise}</b><br>${log.weight} kg × ${log.reps}<br><small>${log.date}</small>`;container.appendChild(card)})}
</script>
</body>
</html>
