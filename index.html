<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
--bg:#0b0d11;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--accent:linear-gradient(135deg,#60a5fa,#a78bfa);
--text:#f1f5f9;
--muted:#94a3b8;
}

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
color:var(--text);
}

header{
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.tabs{
display:flex;
gap:8px;
padding:0 12px 12px;
}

.tab{
flex:1;
padding:10px;
border-radius:14px;
text-align:center;
background:#131720;
color:var(--muted);
}

.tab.active{
background:var(--accent);
color:white;
}

.container{padding:14px;}

.card{
background:var(--card);
border:1px solid var(--border);
padding:16px;
margin-bottom:14px;
border-radius:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
margin-top:8px;
font-size:15px;
}

.theme{background:#131720;color:var(--muted);}
.theme.active{background:var(--accent);color:white;}

.start{background:var(--accent);color:white;}
.finish{background:#ef4444;color:white;}
.swap{background:#1f2430;color:white;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:12px;
border:1px solid var(--border);
background:#0f131a;
color:white;
}

.progress{
height:8px;
background:#1f2430;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:var(--accent);
width:0%;
}

.timer{
font-size:18px;
margin-top:4px;
color:#a5b4fc;
}
</style>
</head>

<body>

<header>🏋️ AthleticLog</header>

<div class="tabs">
<div class="tab active" onclick="showTab('schedule',this)">Schedule</div>
<div class="tab" onclick="showTab('history',this)">History</div>
<div class="tab" onclick="showTab('stats',this)">Stats</div>
</div>

<div class="container" id="app"></div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

const pools={
push:["Bench Press","Incline Press","Overhead Press","Dips"],
pull:["Pull Up","Row","Face Pull"],
legs:["Squat","Lunge","RDL"],
core:["Plank","Hanging Raise","Twist"],
explosive:["Clean","Box Jump","Sprint"]
};

let selected=new Set(["push"]);
let workout=[];
let startTime=null;
let timerInterval=null;

function showTab(name,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
if(name==="schedule") schedule();
if(name==="history") historyView();
if(name==="stats") statsView();
}

function schedule(){
const today=new Date().toLocaleDateString(undefined,{weekday:'long'});
document.getElementById("app").innerHTML=`
<div class="card"><h3>${today}</h3><h2>${Array.from(selected).join(" + ")}</h2></div>

<div class="card">
<div class="grid">
${btn("push","Push")}
${btn("pull","Pull")}
${btn("legs","Legs")}
${btn("core","Core")}
${btn("explosive","Explosive")}
</div>
<button class="start" onclick="start()">Start Workout</button>
</div>

<div id="w"></div>`;
}

function btn(k,l){
const a=selected.has(k)?"active":"";
return `<button class="theme ${a}" onclick="toggle('${k}')">${l}</button>`;
}

function toggle(t){
selected.has(t)?selected.delete(t):selected.add(t);
if(selected.size===0) selected.add("push");
schedule();
}

function pool(){
let s=new Set();
selected.forEach(t=>pools[t].forEach(e=>s.add(e)));
return Array.from(s);
}

function start(){
const p=pool();
workout=[];
for(let i=0;i<5;i++){
workout.push({name:p[Math.floor(Math.random()*p.length)],sets:[]});
}
startTime=Date.now();
clearInterval(timerInterval);
timerInterval=setInterval(updateTimer,1000);
renderWorkout();
}

function updateTimer(){
const diff=Math.floor((Date.now()-startTime)/1000);
const m=Math.floor(diff/60).toString().padStart(2,'0');
const s=(diff%60).toString().padStart(2,'0');
document.getElementById("timer").textContent=`⏱ ${m}:${s}`;
}

function renderWorkout(){
const w=document.getElementById("w");
w.innerHTML=`<div class="card">
<div id="timer" class="timer">⏱ 00:00</div>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>`;

workout.forEach((e,i)=>{
w.innerHTML+=`<div class="card">
<h4>${e.name}</h4>
<button class="swap" onclick="swap(${i})">Swap</button>
<input id="w${i}" placeholder="Weight">
<input id="r${i}" placeholder="Reps">
<button onclick="logSet(${i})">Add Set</button>
</div>`;
});

w.innerHTML+=`<button class="finish" onclick="finish()">Finish Workout</button>`;
}

function logSet(i){
const w=document.getElementById(`w${i}`).value;
const r=document.getElementById(`r${i}`).value;
if(!w||!r) return;
workout[i].sets.push({w,r});
updateProgress();
}

function updateProgress(){
const total=workout.length;
const done=workout.filter(e=>e.sets.length>0).length;
document.getElementById("bar").style.width=(done/total*100)+"%";
}

function swap(i){
const p=pool();
workout[i].name=p[Math.floor(Math.random()*p.length)];
renderWorkout();
}

function finish(){
clearInterval(timerInterval);
const history=JSON.parse(localStorage.getItem("history")||"[]");
history.push({
date:new Date().toLocaleString(),
themes:Array.from(selected),
workout:workout,
duration:Math.floor((Date.now()-startTime)/1000)
});
localStorage.setItem("history",JSON.stringify(history));
schedule();
}

function historyView(){
const h=JSON.parse(localStorage.getItem("history")||"[]");
let html="<div class='card'><b>Past Sessions</b></div>";
h.slice().reverse().forEach(s=>{
html+=`<div class="card">${s.date}<br>${s.themes.join(" + ")}</div>`;
});
document.getElementById("app").innerHTML=html;
}

function statsView(){
const h=JSON.parse(localStorage.getItem("history")||"[]");
const body=JSON.parse(localStorage.getItem("body")||"{}");

let totalSets=0,totalTime=0,themeCount={};

h.forEach(s=>{
totalTime+=s.duration||0;
s.workout.forEach(e=>totalSets+=e.sets.length);
s.themes.forEach(t=>themeCount[t]=(themeCount[t]||0)+1);
});

let mostTheme=Object.keys(themeCount).sort((a,b)=>themeCount[b]-themeCount[a])[0]||"None";

document.getElementById("app").innerHTML=`
<div class="card">
<b>Total workouts:</b> ${h.length}<br>
<b>Total sets:</b> ${totalSets}<br>
<b>Most trained:</b> ${mostTheme}<br>
<b>Total time:</b> ${Math.floor(totalTime/60)} min
</div>

<div class="card">
<h3>Body Measurements</h3>
<input id="bw" placeholder="Weight" value="${body.weight||''}">
<input id="bf" placeholder="Body Fat %" value="${body.fat||''}">
<input id="ch" placeholder="Chest" value="${body.chest||''}">
<input id="wa" placeholder="Waist" value="${body.waist||''}">
<input id="ar" placeholder="Arms" value="${body.arms||''}">
<button onclick="saveBody()">Save Measurements</button>
</div>
`;
}

function saveBody(){
const data={
weight:document.getElementById("bw").value,
fat:document.getElementById("bf").value,
chest:document.getElementById("ch").value,
waist:document.getElementById("wa").value,
arms:document.getElementById("ar").value
};
localStorage.setItem("body",JSON.stringify(data));
alert("Saved");
}

schedule();
</script>

</body>
</html>
