<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#0f1115;
    color:#f2f5f7;
}

header{
    padding:16px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}

.tabs{
    display:flex;
    gap:8px;
    padding:0 12px 12px 12px;
}

.tab{
    flex:1;
    padding:10px;
    border-radius:14px;
    text-align:center;
    background:#1a1d24;
    color:#9aa3ad;
}

.tab.active{
    background:linear-gradient(135deg,#4ade80,#22c55e);
    color:black;
    font-weight:600;
}

.container{
    padding:12px;
}

.card{
    background:#1a1d24;
    padding:16px;
    margin-bottom:14px;
    border-radius:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    margin-top:8px;
    font-size:16px;
}

.start{
    background:linear-gradient(135deg,#60a5fa,#3b82f6);
    color:white;
}

.finish{
    background:linear-gradient(135deg,#fb7185,#ef4444);
    color:white;
}

.swap{
    background:#2b2f38;
    color:white;
}

.log{
    background:#22c55e;
    color:black;
}

.theme-btn{
    background:#2b2f38;
    color:#cbd5e1;
}

.theme-btn.active{
    background:linear-gradient(135deg,#a78bfa,#8b5cf6);
    color:white;
    box-shadow:0 0 12px rgba(168,139,250,0.7);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
}
</style>
</head>

<body>

<header>🏋️ AthleticLog</header>

<div class="tabs">
    <div class="tab active" onclick="showTab('schedule',this)">🏋️ Schedule</div>
    <div class="tab" onclick="showTab('history',this)">📜 History</div>
    <div class="tab" onclick="showTab('stats',this)">📊 Stats</div>
</div>

<div class="container" id="app"></div>

<script>
const exercises={
explosive:["Power Clean","Box Jump","Kettlebell Swing","Sprint"],
push:["Bench Press","Incline Bench Press","Overhead Press","Dips"],
pull:["Pull Up","Barbell Row","Lat Pulldown","Dumbbell Row"],
legs:["Back Squat","Front Squat","Bulgarian Split Squat","Romanian Deadlift"],
core:["Plank","Russian Twist","Hanging Leg Raise"]
};

let selectedThemes=new Set(["push"]);
let currentWorkout=[];

function showTab(name,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');

    if(name==="schedule") renderSchedule();
    if(name==="history") renderHistory();
    if(name==="stats") renderStats();
}

function renderSchedule(){
    const today=new Date().toLocaleDateString(undefined,{weekday:'long'});
    const app=document.getElementById("app");

    app.innerHTML=`
    <div class="card">
        <h3>🗓 ${today}</h3>
        <h2>🔥 ${Array.from(selectedThemes).join(" + ").toUpperCase()}</h2>
    </div>

    <div class="card">
        <b>Select Training Focus</b>
        <div class="grid">
            ${themeButton("explosive","🔥 Explosive")}
            ${themeButton("push","💪 Push")}
            ${themeButton("pull","🧲 Pull")}
            ${themeButton("legs","🦵 Legs")}
            ${themeButton("core","🎯 Core")}
        </div>
        <button class="start" onclick="startWorkout()">🚀 Start Workout</button>
    </div>

    <div id="workout"></div>
    `;
}

function themeButton(key,label){
    const active=selectedThemes.has(key)?"active":"";
    return `<button class="theme-btn ${active}" onclick="toggleTheme('${key}')">${label}</button>`;
}

function toggleTheme(t){
    if(selectedThemes.has(t)) selectedThemes.delete(t);
    else selectedThemes.add(t);

    if(selectedThemes.size===0) selectedThemes.add("push");

    renderSchedule();
}

function combinedPool(){
    const pool=new Set();
    selectedThemes.forEach(t=>{
        exercises[t].forEach(e=>pool.add(e));
    });
    return Array.from(pool);
}

function pickExercises(){
    const pool=combinedPool();
    const chosen=[];
    while(chosen.length<5 && pool.length>0){
        const ex=pool[Math.floor(Math.random()*pool.length)];
        if(!chosen.includes(ex)) chosen.push(ex);
    }
    return chosen;
}

function startWorkout(){
    currentWorkout=pickExercises().map(e=>({exercise:e,sets:[]}));
    renderWorkout();
}

function renderWorkout(){
    const div=document.getElementById("workout");
    div.innerHTML="";

    currentWorkout.forEach((item,i)=>{
        const c=document.createElement("div");
        c.className="card";
        c.innerHTML=`
            <h4>${item.exercise}</h4>
            <button class="swap" onclick="swapExercise(${i})">🔁 Swap Exercise</button>
            <input placeholder="Weight" id="w-${i}">
            <input placeholder="Reps" id="r-${i}">
            <button class="log" onclick="addSet(${i})">➕ Add Set</button>
        `;
        div.appendChild(c);
    });

    div.innerHTML+=`<button class="finish" onclick="finishWorkout()">🏁 Finish Workout</button>`;
}

function swapExercise(i){
    const pool=combinedPool();
    let ex;
    do{
        ex=pool[Math.floor(Math.random()*pool.length)];
    }while(currentWorkout.some(e=>e.exercise===ex));
    currentWorkout[i].exercise=ex;
    renderWorkout();
}

function addSet(i){
    const w=document.getElementById(`w-${i}`).value;
    const r=document.getElementById(`r-${i}`).value;
    if(!w||!r)return;
    currentWorkout[i].sets.push({w,r});
}

function finishWorkout(){
    const history=JSON.parse(localStorage.getItem("history")||"[]");
    history.push({
        date:new Date().toLocaleString(),
        themes:Array.from(selectedThemes),
        workout:currentWorkout
    });
    localStorage.setItem("history",JSON.stringify(history));
    renderSchedule();
}

function renderHistory(){
    const app=document.getElementById("app");
    const history=JSON.parse(localStorage.getItem("history")||"[]");

    app.innerHTML="<h3>📜 Past Workouts</h3>";

    history.slice().reverse().forEach(w=>{
        const c=document.createElement("div");
        c.className="card";
        c.innerHTML=`<b>${w.date}</b><br>${w.themes.join(" + ")}`;
        app.appendChild(c);
    });
}

function renderStats(){
    document.getElementById("app").innerHTML="<h3>📊 Stats dashboard coming next</h3>";
}

renderSchedule();
</script>

</body>
</html>
