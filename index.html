<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#0f0f0f;color:white;margin:0;padding:20px}
h1{text-align:center;margin-top:0}
button{width:100%;padding:14px;margin:6px 0;font-size:17px;border:none;border-radius:12px}
.start{background:#28a745}
.finish{background:#dc3545}
.history{background:#444}
.log{background:#007bff}
.card{background:#1c1c1c;padding:14px;margin:10px 0;border-radius:12px}
.set{font-size:14px;opacity:.9}
input{width:48%;padding:8px;border-radius:8px;border:none}
.row{display:flex;gap:4%;margin-top:6px}
</style>
</head>
<body>

<h1>AthleticLog</h1>

<button class="start" onclick="startWorkout()">Start Workout</button>
<button class="finish" onclick="finishWorkout()">Finish Workout</button>
<button class="history" onclick="showHistory()">History</button>

<div id="app"></div>

<script>
const exercises=["Back Squat","Front Squat","Goblet Squat","Bulgarian Split Squat","Walking Lunges","Leg Press","Hack Squat","Romanian Deadlift","Deadlift","Sumo Deadlift","Trap Bar Deadlift","Bench Press","Incline Bench Press","Push Up","Dips","Overhead Press","Lateral Raise","Pull Up","Lat Pulldown","Barbell Row","Dumbbell Row","Face Pull","Shrugs","Kettlebell Swing","Power Clean","Box Jump","Plank","Russian Twist","Hanging Leg Raise","Battle Ropes","Sled Push","Sprint","Calf Raise","Single Leg Deadlift","Good Morning","Cable Kickback","Clamshell","Turkish Get Up"];

let currentWorkout = [];

function pickExercises(){
    const chosen=[];
    while(chosen.length<5){
        const pick=exercises[Math.floor(Math.random()*exercises.length)];
        if(!chosen.includes(pick)) chosen.push(pick);
    }
    return chosen;
}

function startWorkout(){
    currentWorkout = pickExercises().map(ex=>({exercise:ex,sets:[]}));
    renderWorkout();
}

function renderWorkout(){
    const app=document.getElementById("app");
    app.innerHTML="";
    currentWorkout.forEach((item,i)=>{
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <h3>${item.exercise}</h3>
            <div id="sets-${i}"></div>
            <div class="row">
                <input type="number" placeholder="Weight" id="w-${i}">
                <input type="number" placeholder="Reps" id="r-${i}">
            </div>
            <button class="log" onclick="addSet(${i})">Add Set</button>
        `;
        app.appendChild(card);
        updateSets(i);
    });
}

function addSet(i){
    const w=document.getElementById(`w-${i}`).value;
    const r=document.getElementById(`r-${i}`).value;
    if(!w||!r){alert("Enter weight and reps");return;}
    currentWorkout[i].sets.push({w,r});
    updateSets(i);
    document.getElementById(`w-${i}`).value="";
    document.getElementById(`r-${i}`).value="";
}

function updateSets(i){
    const div=document.getElementById(`sets-${i}`);
    if(!div) return;
    div.innerHTML=currentWorkout[i].sets.map(s=>`<div class="set">${s.w}kg × ${s.r}</div>`).join("");
}

function finishWorkout(){
    if(currentWorkout.length===0) return;
    const history=JSON.parse(localStorage.getItem("history")||"[]");
    history.push({
        date:new Date().toLocaleString(),
        workout:currentWorkout
    });
    localStorage.setItem("history",JSON.stringify(history));
    currentWorkout=[];
    document.getElementById("app").innerHTML="<h2>Workout Saved</h2>";
}

function showHistory(){
    const history=JSON.parse(localStorage.getItem("history")||"[]");
    const app=document.getElementById("app");
    app.innerHTML="<h2>Past Workouts</h2>";
    history.slice().reverse().forEach(w=>{
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`<b>${w.date}</b>`;
        w.workout.forEach(ex=>{
            card.innerHTML+=`<div class="set">${ex.exercise}: ${ex.sets.map(s=>s.w+"kg×"+s.r).join(", ")}</div>`;
        });
        app.appendChild(card);
    });
}
</script>

</body>
</html>
