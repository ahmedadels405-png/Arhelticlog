<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleticLog</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0a0c10;
--card:#11151c;
--border:#1f2633;
--accent:linear-gradient(135deg,#4f46e5,#06b6d4);
--text:#f1f5f9;
--muted:#94a3b8;
}

body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);}
header{padding:20px;text-align:center;font-size:24px;font-weight:700;background:var(--accent);}
.tabs{display:flex;gap:8px;padding:12px;}
.tab{flex:1;padding:12px;border-radius:16px;text-align:center;background:#121826;color:var(--muted);}
.tab.active{background:var(--accent);color:white;}
.container{padding:14px;}
.card{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,0.4);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
button{width:100%;padding:12px;border:none;border-radius:14px;margin-top:8px;font-size:15px;background:#1f2633;color:white;}
.theme.active{background:var(--accent);}
.start{background:var(--accent);}
.finish{background:#ef4444;}
.swap{background:#374151;}
input{width:100%;padding:10px;margin-top:6px;border-radius:12px;border:1px solid var(--border);background:#0f131a;color:white;}
.timer{font-size:18px;margin-top:4px;color:#38bdf8;}
.progress-ring{width:90px;height:90px;border-radius:50%;background:conic-gradient(#06b6d4 0%, #1f2430 0%);display:flex;align-items:center;justify-content:center;margin:auto;}
.progress-ring span{font-size:18px;}
.stat-tile{background:linear-gradient(135deg,#1f2937,#111827);padding:12px;border-radius:14px;text-align:center;}
.stat-value{font-size:20px;font-weight:700;}
.stat-label{font-size:12px;color:var(--muted);}
.section-title{font-weight:700;margin-bottom:10px;}
</style>
</head>

<body>

<header>🏋️ AthleticLog</header>

<div class="tabs">
<div class="tab active" onclick="showTab('schedule',this)">Schedule</div>
<div class="tab" onclick="showTab('history',this)">History</div>
<div class="tab" onclick="showTab('stats',this)">Stats</div>
</div>

<div class="container" id="app"></div>

<script>
const exerciseLibrary={
push:["Bench Press","Incline Press","Overhead Press","Dips"],
pull:["Pull Up","Barbell Row","Face Pull"],
legs:["Squat","Lunge","RDL"],
core:["Plank","Hanging Raise","Russian Twist"],
explosive:["Power Clean","Box Jump","Sprint"]
};

const stretches=[
"Neck Rolls","Hip Flexor Stretch","Hamstring Stretch",
"Thoracic Rotations","Ankle Mobility"
];

let selectedThemes=new Set(["push"]);
let workout=[];
let startTime=null;
let timerInterval=null;

if(!localStorage.getItem("history")) localStorage.setItem("history","[]");
if(!localStorage.getItem("bodyLog")) localStorage.setItem("bodyLog","[]");

function showTab(name,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
if(name==="schedule") renderSchedule();
if(name==="history") renderHistory();
if(name==="stats") renderStats();
}

function renderSchedule(){
document.getElementById("app").innerHTML=`
<div class="card">
<div class="section-title">📅 Today’s Focus</div>
<h2>${Array.from(selectedThemes).join(" + ")}</h2>
</div>

<div class="card">
<div class="section-title">🎯 Training Themes</div>
<div class="grid">
${themeBtn("push")}${themeBtn("pull")}${themeBtn("legs")}
${themeBtn("core")}${themeBtn("explosive")}
</div>
<button class="start" onclick="startWorkout()">🚀 Start Workout</button>
</div>

<div class="card">
<div class="section-title">🧘 Daily Mobility</div>
<ul>${stretches.map(s=>`<li>${s}</li>`).join("")}</ul>
</div>

<div id="workout"></div>`;
}

function themeBtn(t){
const active=selectedThemes.has(t)?"active":"";
return `<button class="theme ${active}" onclick="toggleTheme('${t}')">${t}</button>`;
}

function toggleTheme(t){
selectedThemes.has(t)?selectedThemes.delete(t):selectedThemes.add(t);
if(selectedThemes.size===0) selectedThemes.add("push");
renderSchedule();
}

function allExercises(){
let all=[];
Object.values(exerciseLibrary).forEach(arr=>all.push(...arr));
return all;
}

function startWorkout(){
const pool=[];
selectedThemes.forEach(t=>pool.push(...exerciseLibrary[t]));
workout=[];
for(let i=0;i<5;i++){
workout.push({name:pool[Math.floor(Math.random()*pool.length)],sets:[]});
}
startTime=Date.now();
timerInterval=setInterval(updateTimer,1000);
renderWorkout();
}

function updateTimer(){
const diff=Math.floor((Date.now()-startTime)/1000);
const m=Math.floor(diff/60).toString().padStart(2,'0');
const s=(diff%60).toString().padStart(2,'0');
document.getElementById("timer").textContent=`⏱ ${m}:${s}`;
}

function renderWorkout(){
const container=document.getElementById("workout");
container.innerHTML=`
<div class="card" style="text-align:center">
<div class="progress-ring" id="ring"><span id="pct">0%</span></div>
<div id="timer" class="timer">⏱ 00:00</div>
</div>`;

workout.forEach((e,i)=>{
container.innerHTML+=`
<div class="card">
<h4>${e.name}</h4>
<button class="swap" onclick="swapExercise(${i})">🔁 Swap Exercise</button>
<input id="w${i}" placeholder="Weight">
<input id="r${i}" placeholder="Reps">
<button onclick="logSet(${i})">➕ Add Set</button>
</div>`;
});

container.innerHTML+=`<button class="finish" onclick="finishWorkout()">🏁 Finish Workout</button>`;
}

function logSet(i){
const w=document.getElementById(`w${i}`).value;
const r=document.getElementById(`r${i}`).value;
if(!w||!r) return;
workout[i].sets.push({w,r});
updateProgress();
}

function updateProgress(){
const done=workout.filter(e=>e.sets.length>0).length;
const pct=Math.floor(done/workout.length*100);
document.getElementById("pct").textContent=pct+"%";
document.getElementById("ring").style.background=
`conic-gradient(#06b6d4 ${pct}%, #1f2430 ${pct}%)`;
}

function swapExercise(i){
const pool=allExercises();
workout[i].name=pool[Math.floor(Math.random()*pool.length)];
renderWorkout();
}

function finishWorkout(){
clearInterval(timerInterval);

const history=JSON.parse(localStorage.getItem("history"));
history.push({
date:new Date().toLocaleString(),
duration:Math.floor((Date.now()-startTime)/1000),
workout:workout
});
localStorage.setItem("history",JSON.stringify(history));
renderSchedule();
}

function renderHistory(){
const h=JSON.parse(localStorage.getItem("history"));
document.getElementById("app").innerHTML=
h.reverse().map(s=>`
<div class="card">
📅 ${s.date}<br>
⏱ ${Math.floor(s.duration/60)} min
</div>`).join("");
}

function renderStats(){
const bodyLog=JSON.parse(localStorage.getItem("bodyLog"));
const history=JSON.parse(localStorage.getItem("history"));

let totalSets=0,totalTime=0;
history.forEach(s=>{
totalTime+=s.duration||0;
s.workout.forEach(e=>totalSets+=e.sets.length);
});

document.getElementById("app").innerHTML=`
<div class="card">
<div class="section-title">🏋️ Training Stats</div>
<div class="grid">
${tile(history.length,"Workouts")}
${tile(totalSets,"Sets")}
${tile(Math.floor(totalTime/60),"Minutes")}
</div>
</div>

<div class="card">
<div class="section-title">⚖️ Body Stats</div>
<div class="grid">
${tile(latest(bodyLog,"weight"),"Weight")}
${tile(latest(bodyLog,"fat")+"%","Body Fat")}
</div>
</div>

<div class="card">
<div class="section-title">✏️ Log Measurement</div>
<input id="bw" placeholder="Weight (kg)">
<input id="bf" placeholder="Body Fat %">
<button onclick="saveBody()">💾 Save</button>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
`;

drawChart(bodyLog);
}

function tile(v,l){
return `<div class="stat-tile"><div class="stat-value">${v||"--"}</div><div class="stat-label">${l}</div></div>`;
}

function latest(arr,key){
if(arr.length===0) return "--";
return arr[arr.length-1][key];
}

function saveBody(){
const weight=document.getElementById("bw").value;
const fat=document.getElementById("bf").value;
if(!weight||!fat) return;

const log=JSON.parse(localStorage.getItem("bodyLog"));
log.push({
date:new Date().toLocaleDateString(),
weight:parseFloat(weight),
fat:parseFloat(fat)
});
localStorage.setItem("bodyLog",JSON.stringify(log));
renderStats();
}

function drawChart(log){
const ctx=document.getElementById("chart");
new Chart(ctx,{
type:"line",
data:{
labels:log.map(e=>e.date),
datasets:[
{label:"Weight",data:log.map(e=>e.weight),borderColor:"#4f46e5"},
{label:"Body Fat %",data:log.map(e=>e.fat),borderColor:"#06b6d4"}
]
},
options:{
plugins:{legend:{labels:{color:"#fff"}}},
scales:{
x:{ticks:{color:"#aaa"}},
y:{ticks:{color:"#aaa"}}
}
}
});
}

renderSchedule();
</script>

</body>
</html>
